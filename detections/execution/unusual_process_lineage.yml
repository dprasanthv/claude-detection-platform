title: Office Application Spawning Script Interpreter
id: cdp.execution.office_spawns_script_host
description: >-
  An Office process (Word, Excel, PowerPoint, Outlook) is the parent of a
  shell or scripting interpreter (cmd, PowerShell, wscript, cscript). This
  parent/child pair is the textbook signature for malicious-document execution
  (T1566.001 → T1059) and is rarely seen in benign user activity.
status: test
level: high
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - \powershell.exe
      - \cmd.exe
      - \wscript.exe
      - \cscript.exe
      - \mshta.exe
    ParentImage|endswith:
      - \WINWORD.EXE
      - \EXCEL.EXE
      - \POWERPNT.EXE
      - \OUTLOOK.EXE
  condition: selection
tags:
  - attack.execution
  - attack.t1059
falsepositives:
  - Custom enterprise macros that legitimately call out to PowerShell signing tools.
references:
  - https://attack.mitre.org/techniques/T1059/
  - https://attack.mitre.org/techniques/T1566/001/
