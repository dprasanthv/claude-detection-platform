title: New Windows Service Created Via sc.exe
id: cdp.persistence.new_service_install
description: >-
  ``sc.exe create`` (or ``sc.exe config``) is the most common command-line
  primitive for installing or repurposing a Windows service. Adversaries use
  this for persistence (T1543.003) since services survive reboot and can run
  as ``LocalSystem``.
status: test
level: high
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: \sc.exe
  verbs:
    CommandLine|contains:
      - ' create '
      - ' config '
  condition: selection and verbs
tags:
  - attack.persistence
  - attack.t1543.003
falsepositives:
  - MSI installers and legitimate sysadmin scripts that register services.
references:
  - https://attack.mitre.org/techniques/T1543/003/
